<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DOCX 檢閱者名稱整理</title>
<script src="jszip.min.js"></script>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --border: #e3e5ea;
    --text: #1f2328;
    --muted: #646b75;
    --accent: #2b6cb0;
    --accent-hover: #245a94;
    --danger: #c0392b;
    --ok: #2f8f4e;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
                 "Hiragino Sans", "Yu Gothic", "Microsoft JhengHei", sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 14px;
  }
  .wrap { max-width: 880px; margin: 32px auto; padding: 0 20px; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; margin-bottom: 8px;
  }
  .topbar .title { flex: 1; min-width: 0; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .lead { color: var(--muted); margin: 0 0 20px; }
  .lang-switch {
    display: inline-flex; flex-shrink: 0;
    border: 1px solid var(--border); border-radius: 6px;
    overflow: hidden; background: #fff;
  }
  .lang-switch button {
    border: none; background: transparent;
    padding: 6px 12px; font: inherit; color: var(--muted);
    cursor: pointer; border-radius: 0;
    border-right: 1px solid var(--border);
  }
  .lang-switch button:last-child { border-right: none; }
  .lang-switch button:hover { background: #f0f6fc; color: var(--text); }
  .lang-switch button.active {
    background: var(--accent); color: #fff;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px; margin-bottom: 16px;
  }
  .drop {
    border: 2px dashed var(--border); border-radius: 8px;
    padding: 32px; text-align: center; cursor: pointer;
    transition: border-color .15s, background .15s;
    user-select: none;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  .drop:focus, .drop:focus-visible,
  .drop *:focus, .drop *:focus-visible { outline: none; }
  .drop:hover, .drop.dragover {
    border-color: var(--accent); background: #f0f6fc;
  }
  .drop p { margin: 4px 0; color: var(--muted); }
  .drop strong { color: var(--text); }
  button {
    font: inherit; cursor: pointer;
    padding: 8px 16px; border-radius: 6px;
    border: 1px solid var(--border); background: #fff; color: var(--text);
  }
  button.primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; }
  th, td {
    text-align: left; padding: 10px 8px;
    border-bottom: 1px solid var(--border); vertical-align: middle;
  }
  th { color: var(--muted); font-weight: 600; font-size: 13px; }
  td.count { color: var(--muted); width: 72px; text-align: right; }
  td.orig { font-weight: 500; }
  td input[type=text] {
    width: 100%; padding: 6px 8px;
    border: 1px solid var(--border); border-radius: 4px;
    font: inherit; color: var(--text);
  }
  td input[type=text]:focus { outline: none; border-color: var(--accent); }
  .row { display: flex; align-items: center; gap: 12px; }
  .row .grow { flex: 1; }
  .meta { color: var(--muted); font-size: 13px; }
  .status { margin-top: 12px; font-size: 13px; }
  .status.ok { color: var(--ok); }
  .status.err { color: var(--danger); }
  .hint {
    margin-top: 16px; padding: 12px 14px;
    background: #f7f8fa; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); font-size: 13px; line-height: 1.55;
  }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">
      <h1 data-i18n="title">DOCX 檢閱者名稱整理</h1>
      <p class="lead" data-i18n="lead">批次改寫 Word 追蹤修訂中的檢閱者名稱。檔案完全在瀏覽器本地處理，不會上傳任何伺服器。</p>
    </div>
    <div class="lang-switch" role="group" aria-label="Language">
      <button type="button" data-lang="zh">中文</button>
      <button type="button" data-lang="en">English</button>
      <button type="button" data-lang="ja">日本語</button>
    </div>
  </div>

  <div class="card" id="uploadCard">
    <div class="drop" id="drop" role="button" tabindex="0">
      <p><strong data-i18n="dropMain">點此選擇或拖曳 .docx 檔案</strong></p>
      <p data-i18n="dropSub">僅支援 .docx 格式</p>
    </div>
    <input type="file" id="file" accept=".docx" hidden />
    <div class="status err" id="uploadErr"></div>
  </div>

  <div class="card hidden" id="editorCard">
    <div class="row" style="margin-bottom: 12px;">
      <div class="grow">
        <div><strong id="fileName"></strong></div>
        <div class="meta" id="summary"></div>
      </div>
      <button id="resetBtn" data-i18n="resetFile">重新選擇檔案</button>
    </div>

    <table>
      <thead>
        <tr>
          <th data-i18n="thOrig">原始名稱</th>
          <th data-i18n="thNew">新名稱</th>
          <th class="count" data-i18n="thCount">修訂數</th>
        </tr>
      </thead>
      <tbody id="authorRows"></tbody>
    </table>

    <div class="row" style="margin-top: 16px; justify-content: flex-end; gap: 8px;">
      <button id="resetMapBtn" data-i18n="resetMap">還原</button>
      <button class="primary" id="applyBtn" data-i18n="apply">套用並下載</button>
    </div>
    <div class="status" id="applyStatus"></div>
  </div>

  <div class="hint">
    <strong data-i18n="howToLabel">使用說明：</strong>
    <span data-i18n="howToBody">1. 選擇一份含追蹤修訂的 .docx 檔案。 2. 在「新名稱」欄輸入想改寫成的名字；留白或與原名相同則不會更動。 3. 按「套用並下載」取得改寫後的新檔案。</span><br />
    <strong data-i18n="privacyLabel">隱私與離線：</strong><span data-i18n="privacyBody">檔案完全在瀏覽器本地處理，不會上傳任何伺服器。本頁已內建 JSZip，無需網路連線即可使用。</span>
  </div>
</div>

<script>
(() => {
  const I18N = {
    zh: {
      htmlLang: "zh-Hant",
      title: "DOCX 檢閱者名稱整理",
      lead: "批次改寫 Word 追蹤修訂中的檢閱者名稱。檔案完全在瀏覽器本地處理，不會上傳任何伺服器。",
      dropMain: "點此選擇或拖曳 .docx 檔案",
      dropSub: "僅支援 .docx 格式",
      resetFile: "重新選擇檔案",
      thOrig: "原始名稱",
      thNew: "新名稱",
      thCount: "修訂數",
      inputPh: "保留原名",
      resetMap: "還原",
      apply: "套用並下載",
      howToLabel: "使用說明：",
      howToBody: "1. 選擇一份含追蹤修訂的 .docx 檔案。 2. 在「新名稱」欄輸入想改寫成的名字；留白或與原名相同則不會更動。 3. 按「套用並下載」取得改寫後的新檔案。",
      privacyLabel: "隱私與離線：",
      privacyBody: "檔案完全在瀏覽器本地處理，不會上傳任何伺服器。本頁已內建 JSZip，無需網路連線即可使用。",
      errOnlyDocx: "僅支援 .docx 檔案",
      errBadZip: "檔案損毀或不是有效的 .docx 檔案",
      errNoAuthor: "檔案內沒有可處理的追蹤修訂者",
      summary: (n, total) => `共 ${n} 位檢閱者，${total} 筆追蹤修訂`,
      errNoMapping: "沒有可套用的修訂者名稱變更",
      processing: "處理中…",
      errNoMatch: "找不到可套用的修訂者名稱，請確認映射內容",
      okApplied: (n, parts) => `已套用 ${n} 筆變更，涵蓋 ${parts} 個 XML 區塊。`,
      errApply: (msg) => `套用變更失敗：${msg}`,
    },
    en: {
      htmlLang: "en",
      title: "DOCX Reviewer Name Cleaner",
      lead: "Batch-rename reviewer names in Word track-changes (.docx) files. All processing happens locally in your browser — files are never uploaded.",
      dropMain: "Click or drag a .docx file here",
      dropSub: "Only .docx files are supported",
      resetFile: "Choose another file",
      thOrig: "Original name",
      thNew: "New name",
      thCount: "Revisions",
      inputPh: "Keep original",
      resetMap: "Reset",
      apply: "Apply & download",
      howToLabel: "How to use:",
      howToBody: "1. Pick a .docx file that contains tracked changes. 2. Type the replacement name in the \"New name\" column; leave blank or keep the original to skip a reviewer. 3. Click \"Apply & download\" to get the updated file.",
      privacyLabel: "Privacy & offline:",
      privacyBody: "Files are processed entirely in your browser and never uploaded. JSZip is bundled locally, so an internet connection is not required.",
      errOnlyDocx: "Only .docx files are supported",
      errBadZip: "The file is corrupted or not a valid .docx",
      errNoAuthor: "No tracked-change authors were found in this file",
      summary: (n, total) => `${n} reviewer${n === 1 ? "" : "s"}, ${total} tracked revision${total === 1 ? "" : "s"}`,
      errNoMapping: "No reviewer name changes to apply",
      processing: "Processing…",
      errNoMatch: "Could not find any matching reviewer names. Please review your mapping.",
      okApplied: (n, parts) => `Applied ${n} change${n === 1 ? "" : "s"} across ${parts} XML part${parts === 1 ? "" : "s"}.`,
      errApply: (msg) => `Failed to apply changes: ${msg}`,
    },
    ja: {
      htmlLang: "ja",
      title: "DOCX 校閲者名の整理",
      lead: "Word の変更履歴に記録された校閲者名を一括で書き換えます。ファイルはすべてブラウザ内で処理され、サーバーには送信されません。",
      dropMain: "ここをクリックまたは .docx ファイルをドロップ",
      dropSub: ".docx 形式のみ対応",
      resetFile: "ファイルを選び直す",
      thOrig: "元の名前",
      thNew: "新しい名前",
      thCount: "変更数",
      inputPh: "元の名前のまま",
      resetMap: "リセット",
      apply: "適用してダウンロード",
      howToLabel: "使い方：",
      howToBody: "1. 変更履歴を含む .docx ファイルを選択します。 2.「新しい名前」欄に置き換え後の名前を入力します。空欄または元と同じ場合は変更されません。 3.「適用してダウンロード」をクリックして、更新後のファイルを取得します。",
      privacyLabel: "プライバシーとオフライン：",
      privacyBody: "ファイルはすべてブラウザ内で処理され、サーバーには送信されません。JSZip はローカルに同梱されているため、インターネット接続は不要です。",
      errOnlyDocx: ".docx ファイルのみ対応しています",
      errBadZip: "ファイルが破損しているか、有効な .docx ではありません",
      errNoAuthor: "このファイルには処理可能な校閲者が見つかりません",
      summary: (n, total) => `校閲者 ${n} 名、変更履歴 ${total} 件`,
      errNoMapping: "適用する名前の変更がありません",
      processing: "処理中…",
      errNoMatch: "一致する校閲者名が見つかりません。マッピング内容をご確認ください。",
      okApplied: (n, parts) => `${n} 件の変更を ${parts} 個の XML パートに適用しました。`,
      errApply: (msg) => `適用に失敗しました：${msg}`,
    },
  };

  function detectLang() {
    const saved = localStorage.getItem("docxRenamer.lang");
    if (saved && I18N[saved]) return saved;
    const nav = (navigator.language || "en").toLowerCase();
    if (nav.startsWith("zh")) return "zh";
    if (nav.startsWith("ja")) return "ja";
    return "en";
  }

  let lang = detectLang();
  const t = (key, ...args) => {
    const entry = I18N[lang][key];
    return typeof entry === "function" ? entry(...args) : entry;
  };

  function applyI18n() {
    document.documentElement.lang = I18N[lang].htmlLang;
    document.title = t("title");
    for (const node of document.querySelectorAll("[data-i18n]")) {
      const key = node.dataset.i18n;
      if (I18N[lang][key] != null) node.textContent = I18N[lang][key];
    }
    for (const btn of document.querySelectorAll(".lang-switch button")) {
      btn.classList.toggle("active", btn.dataset.lang === lang);
    }
    for (const input of document.querySelectorAll("#authorRows input[type=text]")) {
      input.placeholder = t("inputPh");
    }
    if (!editorCard.classList.contains("hidden") && authors.length) {
      const total = authors.reduce((a, b) => a + b.count, 0);
      summaryEl.textContent = t("summary", authors.length, total);
    }
  }

  function setLang(next) {
    if (!I18N[next]) return;
    lang = next;
    localStorage.setItem("docxRenamer.lang", lang);
    applyI18n();
  }

  const AUTHOR_TAG_RE = /<[^>]*\bw:author="[^"]*"[^>]*>/g;
  const AUTHOR_ATTR_RE = /\bw:author="([^"]*)"/;
  const INITIALS_ATTR_RE = /\bw:initials="([^"]*)"/;
  const AUTHOR_ATTR_RE_G = /\bw:author="([^"]*)"/g;

  const el = (id) => document.getElementById(id);
  const dropEl = el("drop");
  const fileEl = el("file");
  const uploadCard = el("uploadCard");
  const uploadErr = el("uploadErr");
  const editorCard = el("editorCard");
  const fileNameEl = el("fileName");
  const summaryEl = el("summary");
  const rowsEl = el("authorRows");
  const applyBtn = el("applyBtn");
  const applyStatus = el("applyStatus");
  const resetBtn = el("resetBtn");
  const resetMapBtn = el("resetMapBtn");

  let currentFile = null;
  let currentZip = null;
  let authors = [];

  function clearChildren(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

  function decodeXml(s) {
    return s
      .replace(/&quot;/g, '"')
      .replace(/&apos;/g, "'")
      .replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">")
      .replace(/&#(\d+);/g, (_, n) => String.fromCharCode(parseInt(n, 10)))
      .replace(/&#x([0-9a-fA-F]+);/g, (_, n) => String.fromCharCode(parseInt(n, 16)))
      .replace(/&amp;/g, "&");
  }
  function encodeXmlAttr(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
  function deriveInitials(value) {
    const cleaned = String(value || "").split(/\s+/).filter(Boolean).join(" ").trim();
    if (!cleaned) return "";
    if (!/\s/.test(cleaned) && cleaned.length <= 8) return cleaned;
    const asciiTokens = cleaned.match(/[A-Za-z0-9]+/g) || [];
    if (asciiTokens.length) {
      const compact = asciiTokens.slice(0, 3).map((tok) => tok[0].toUpperCase()).join("");
      if (compact) return compact;
    }
    const compact = cleaned.replace(/\s+/g, "");
    return compact.slice(0, 3);
  }

  function showError(msg) {
    uploadErr.textContent = msg || "";
  }

  async function parseDocx(file) {
    showError("");
    applyStatus.textContent = "";
    applyStatus.className = "status";

    if (!file || !file.name.toLowerCase().endsWith(".docx")) {
      showError(t("errOnlyDocx"));
      return;
    }

    let zip;
    try {
      zip = await JSZip.loadAsync(await file.arrayBuffer());
    } catch (e) {
      showError(t("errBadZip"));
      return;
    }

    const xmlNames = Object.keys(zip.files).filter(
      (n) => !zip.files[n].dir && n.toLowerCase().endsWith(".xml")
    );

    const counts = new Map();

    for (const name of xmlNames) {
      const text = await zip.file(name).async("string");
      for (const m of text.matchAll(AUTHOR_ATTR_RE_G)) {
        const author = decodeXml(m[1]).trim();
        if (!author) continue;
        counts.set(author, (counts.get(author) || 0) + 1);
      }
    }

    const total = Array.from(counts.values()).reduce((a, b) => a + b, 0);
    if (total === 0) {
      showError(t("errNoAuthor"));
      return;
    }

    currentFile = file;
    currentZip = zip;
    authors = Array.from(counts.entries())
      .map(([name, count]) => ({ name, count }))
      .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));

    fileNameEl.textContent = file.name;
    summaryEl.textContent = t("summary", authors.length, total);
    renderRows();
    uploadCard.classList.add("hidden");
    editorCard.classList.remove("hidden");
  }

  function renderRows() {
    clearChildren(rowsEl);
    for (const a of authors) {
      const tr = document.createElement("tr");
      const tdOrig = document.createElement("td");
      tdOrig.className = "orig";
      tdOrig.textContent = a.name;
      const tdNew = document.createElement("td");
      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = t("inputPh");
      input.dataset.original = a.name;
      tdNew.appendChild(input);
      const tdCount = document.createElement("td");
      tdCount.className = "count";
      tdCount.textContent = a.count;
      tr.appendChild(tdOrig);
      tr.appendChild(tdNew);
      tr.appendChild(tdCount);
      rowsEl.appendChild(tr);
    }
  }

  function collectMapping() {
    const mapping = new Map();
    for (const input of rowsEl.querySelectorAll("input[type=text]")) {
      const oldName = input.dataset.original;
      const newName = input.value.trim();
      if (newName && newName !== oldName) mapping.set(oldName, newName);
    }
    return mapping;
  }

  async function applyAndDownload() {
    applyStatus.textContent = "";
    applyStatus.className = "status";

    const mapping = collectMapping();
    if (mapping.size === 0) {
      applyStatus.textContent = t("errNoMapping");
      applyStatus.className = "status err";
      return;
    }

    applyBtn.disabled = true;
    applyStatus.textContent = t("processing");
    applyStatus.className = "status";

    try {
      const xmlNames = Object.keys(currentZip.files).filter(
        (n) => !currentZip.files[n].dir && n.toLowerCase().endsWith(".xml")
      );

      const replacementsByAuthor = new Map();
      const changedParts = new Set();

      for (const name of xmlNames) {
        const original = await currentZip.file(name).async("string");
        const updated = original.replace(AUTHOR_TAG_RE, (tag) => {
          const authorMatch = tag.match(AUTHOR_ATTR_RE);
          if (!authorMatch) return tag;
          const currentName = decodeXml(authorMatch[1]).trim();
          if (!mapping.has(currentName)) return tag;

          const newName = mapping.get(currentName);
          replacementsByAuthor.set(
            currentName,
            (replacementsByAuthor.get(currentName) || 0) + 1
          );
          changedParts.add(name);

          let out = tag.replace(
            AUTHOR_ATTR_RE,
            `w:author="${encodeXmlAttr(newName)}"`
          );
          if (INITIALS_ATTR_RE.test(out)) {
            const newInitials = deriveInitials(newName);
            out = out.replace(
              INITIALS_ATTR_RE,
              `w:initials="${encodeXmlAttr(newInitials)}"`
            );
          }
          return out;
        });

        if (updated !== original) {
          currentZip.file(name, updated);
        }
      }

      const totalReplacements = Array.from(replacementsByAuthor.values()).reduce(
        (a, b) => a + b,
        0
      );
      if (totalReplacements === 0) {
        applyStatus.textContent = t("errNoMatch");
        applyStatus.className = "status err";
        return;
      }

      const blob = await currentZip.generateAsync({
        type: "blob",
        compression: "DEFLATE",
        mimeType:
          "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
      });

      const base = currentFile.name.replace(/\.docx$/i, "");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `${base}_renamed.docx`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(a.href), 2000);

      applyStatus.textContent = t("okApplied", totalReplacements, changedParts.size);
      applyStatus.className = "status ok";

      currentZip = await JSZip.loadAsync(await currentFile.arrayBuffer());
    } catch (e) {
      console.error(e);
      applyStatus.textContent = t("errApply", e && e.message ? e.message : String(e));
      applyStatus.className = "status err";
    } finally {
      applyBtn.disabled = false;
    }
  }

  function resetAll() {
    currentFile = null;
    currentZip = null;
    authors = [];
    fileEl.value = "";
    clearChildren(rowsEl);
    applyStatus.textContent = "";
    applyStatus.className = "status";
    uploadErr.textContent = "";
    editorCard.classList.add("hidden");
    uploadCard.classList.remove("hidden");
  }

  fileEl.addEventListener("change", (e) => {
    const f = e.target.files && e.target.files[0];
    if (f) parseDocx(f);
  });
  dropEl.addEventListener("click", () => fileEl.click());
  dropEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      fileEl.click();
    }
  });
  dropEl.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropEl.classList.add("dragover");
  });
  dropEl.addEventListener("dragleave", () => dropEl.classList.remove("dragover"));
  dropEl.addEventListener("drop", (e) => {
    e.preventDefault();
    dropEl.classList.remove("dragover");
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) parseDocx(f);
  });
  applyBtn.addEventListener("click", applyAndDownload);
  resetBtn.addEventListener("click", resetAll);
  resetMapBtn.addEventListener("click", () => {
    for (const input of rowsEl.querySelectorAll("input[type=text]")) input.value = "";
  });
  for (const btn of document.querySelectorAll(".lang-switch button")) {
    btn.addEventListener("click", () => setLang(btn.dataset.lang));
  }

  applyI18n();
})();
</script>
</body>
</html>
